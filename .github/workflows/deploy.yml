name: Deploy
on: [push, workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: curl -L "https://claude.ai/public/artifacts/cf6c80cc-3757-4ea1-b762-4a664a8291c0" -o index.html
      - run: git config user.email "action@github.com" && git config user.name "Action" && git add index.html && git commit -m "Update app" --allow-empty && git push
